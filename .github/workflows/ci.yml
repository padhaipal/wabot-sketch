name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so Gitleaks can diff PR base..head.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run format:check

      - run: npm run lint:check

      - run: npm run typecheck

      - run: npm run build

      - name: Gitleaks (PR diff)
        if: github.event_name == 'pull_request'
        env:
          GL_VERSION: 8.21.2
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VERSION}/gitleaks_${GL_VERSION}_linux_x64.tar.gz" \
            | tar xz gitleaks
          ./gitleaks detect \
            --redact \
            --no-banner \
            --verbose \
            --log-opts="--no-merges ${BASE_SHA}..${HEAD_SHA}"

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'

      # Enforces the 80% global threshold (statements / branches / functions
      # / lines) declared in package.json#jest.coverageThreshold.
      - name: Unit tests + coverage gate (>=80% global)
        run: npm run test:cov

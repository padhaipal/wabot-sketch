name: E2E (staging)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-staging
  cancel-in-progress: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Wait 10min for Railway staging deploy
        run: sleep 600

      - name: Dummy e2e
        run: echo "e2e ok"
